<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="style.css" rel="stylesheet" type="text/css" />
    <link href="https://fonts.googleapis.com/css?family=DM+Sans&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@latest/css/all.min.css">
    <script type="module" src="./home.js"></script>
    <link rel="icon" href="favicon.png" type="image/x-icon">
    <title>les petits plats</title>
</head>
<body>
    <header>
        <a href="home.html" class="logo-link" tabindex="1">
            <img src="logo.png" class="logo" alt="les petits plats Home Page" />
        </a>  
        <div class="sentence-and-container">
            <h2> CHERCHEZ PARMI PLUS DE 1500 RECETTES DU QUOTIDIEN, SIMPLES ET DÉLICIEUSES </h2>
            <div class="search-container">
                <form action="/rechercher" method="get">
                    <input type="text" class="text-input" name="query" placeholder="Rechercher une recette, un ingrédient, ...">
                    <button class="button-mobile-version" type="submit">
                        <i class="fa-solid fa-magnifying-glass"></i>
                    </button>
                </form>
            </div>
        </div>
    </header>

    <main id="main" aria-labelledby="page-title">

        <div class="ingredient-filter-container">
            <select id="ingredient-filter" aria-label="Filtrer par ingrédient">
                <option value="">Ingrédients</option>
            </select>
        </div>
        
        <div id="selected-tags" class="selected-tags-container"></div>
        
        <div id="recettes-container" class="recipe-section"></div>
        
    </main>

    <script type="module" src="./home.js"></script>
</body>
</html>
